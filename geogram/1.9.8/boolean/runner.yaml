runner:
  family: geogram
  version: "1.9.8"
  algorithm: boolean
  runner_id: geogram-1.9.8-boolean
  display_name: "Geogram 1.9.8 Boolean"

upstream:
  source: git
  url: https://github.com/BrunoLevy/geogram.git
  ref: v1.9.8
  # resolved_commit is filled in by build.py at build time

build:
  script: ./build.py
  outputs:
    - bin/geogram_runner
    - bin/build-info.json
  default_mode: release

entry:
  kind: executable
  command: ./bin/geogram_runner
  args:
    - --request
    - "{request}"
    - --result
    - "{result}"

variants:
  - id: base
    internal: true
    args: []
    capabilities:
      operations: [union, intersection, difference]
      input_formats: [off, obj, stl]
      requires_closed_meshes: true
      accepts_self_intersections: false
      accepts_non_manifold_inputs: false
      supports_components: false
      supports_variadic_booleans: false

  - id: default
    extends: base
    label: "Default"
    display_name: "Geogram 1.9.8"
    color: "#009688"
    args: []

notes:
  - "Mesh type: GEO::Mesh (3D, double precision)"
  - "Boolean ops: GEO::mesh_union / mesh_intersection / mesh_difference from mesh_surface_intersection.h"
  - "Requires closed, manifold, non-self-intersecting meshes"
  - "Raw mesh format: indexed-tris-f64 (via runner_mesh_helpers)"
  - "io_ms (load-mesh): file → flat double verts + int indices (runner_mesh_helpers::loadFromFileIndexed)"
  - "import_ms (load-mesh): flat f64 verts+indices → GEO::Mesh (vertex/facet population)"
  - "operation_ms (boolean ops): mesh_union/intersection/difference call only"
  - "export_ms (boolean ops): GEO::Mesh → flat f64 verts+indices, excludes disk write"
