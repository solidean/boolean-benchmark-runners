runner:
  family: cork
  version: "2016-3"
  algorithm: boolean
  runner_id: cork-2016-3-boolean
  display_name: "Cork 2016-3 Boolean"

upstream:
  source: git
  url: https://github.com/gilbo/cork.git
  ref: 5987de5
  # resolved_commit is filled in by build.py at build time

build:
  script: ./build.py
  outputs:
    - bin/cork_runner
    - bin/build-info.json
  default_mode: release

entry:
  kind: executable
  command: ./bin/cork_runner
  args:
    - --request
    - "{request}"
    - --result
    - "{result}"

variants:
  - id: base
    internal: true
    args: []
    capabilities:
      operations: [union, intersection, difference]
      input_formats: [off, obj, stl]
      requires_closed_meshes: true
      accepts_self_intersections: false
      accepts_non_manifold_inputs: false
      supports_components: false
      supports_variadic_booleans: false

#  - id: default
#    extends: base
#    label: "Default"
#    display_name: "Cork 2016-3"
#    args: []

notes:
  - "Mesh type: CorkTriMesh (C struct, float vertices)"
  - "Boolean ops: computeUnion / computeIntersection / computeDifference"
  - "Validation: isSolid() — requires closed solid meshes"
  - "Vertex precision: float (32-bit) — inputs converted from double, outputs upcast to double"
  - "Raw mesh format: indexed-tris-f64 (via runner_mesh_helpers)"
  - "io_ms (load-mesh): file → flat double verts + int indices (runner_mesh_helpers::loadFromFileIndexed)"
  - "import_ms (load-mesh): flat f64 → CorkTriMesh (float downcast) + isSolid() validation"
  - "export_ms (boolean ops): CorkTriMesh → flat double verts + int indices (float→double upcast), excludes disk write"
