runner:
  family: solidean
  version: "2026.1"
  runner_id: solidean-2026.1
  display_name: "Solidean 2026.1 (Community)"

upstream:
  source: url
  # Platform-specific downloads — see build.py for URLs
  # resolved_sha256 is filled in by build.py at build time and recorded in bin/build-info.json

build:
  script: ./build.py
  outputs:
    - bin/solidean_runner
    - bin/build-info.json
  default_mode: release

entry:
  kind: executable
  command: ./bin/solidean_runner
  args:
    - --request
    - "{request}"
    - --result
    - "{result}"

variants:
  - id: default
    label: "Default"
    display_name: "Solidean 2026.1"
    color: "#6830FF"
    args: []
    capabilities:
      operations:
        - union
        - intersection
        - difference
      input_formats: [off, obj, stl]
      requires_closed_meshes: true
      accepts_self_intersections: true
      accepts_non_manifold_inputs: false
      supports_components: true
      supports_variadic_booleans: false

notes:
  - "License: Solidean Community Edition — benchmarking/evaluation permitted; redistribution and commercial use prohibited."
  - "License URL: https://solidean.com/legal/solidean-community-license/"
  - "Download (Linux): https://solidean.com/downloads/solidean-sdk/2026-03-12-1bf7dd-Solidean-Community-Ubuntu24.zip"
  - "Download (Windows): https://solidean.com/downloads/solidean-sdk/2026-02-08-4febd1-Solidean-Community-Win64.zip"
  - "ExactArithmetic extent: 1000.0 (uniform cube [-1000, +1000] on all axes — inputs must lie within this volume)."
  - "Global solidean::Context and solidean::ExactArithmetic are created once at startup and reused across all runs."
  - "One ctx->execute call per boolean operation: imports both operands from SSA float32 data, performs op, exports result."
  - "SSA stores float32 indexed meshes (vector<solidean::pos3> + vector<solidean::idxtri>), ready for importFromIndexedTrianglesF32."
  - "Raw mesh format: indexed-tris-f32 (Solidean native float32)."
  - "io_ms (load-mesh): file → double indexed mesh via runner_mesh_helpers::loadFromFileIndexed."
  - "import_ms (load-mesh): double indexed → float32 indexed (vertex double→float cast, index repack into solidean::idxtri)."
  - "operation_ms (boolean ops): ctx->execute duration including importFromIndexedTrianglesF32 + boolean op + exportToIndexedTrianglesF32."
  - "export_ms (boolean ops): blob->getPositionsF32 + blob->getTrianglesIndexed extraction after execute returns."
