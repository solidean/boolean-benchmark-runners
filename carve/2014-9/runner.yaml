runner:
  family: carve
  version: "2014-9"
  algorithm: boolean
  runner_id: carve-2014-9-boolean
  display_name: "Carve 2014-9 Boolean"

upstream:
  source: git
  url: https://github.com/VTREEM/Carve.git
  ref: 78f466b
  # resolved_commit is filled in by build.py at build time

build:
  script: ./build.py
  outputs:
    - bin/carve_runner
    - bin/build-info.json
  default_mode: release

entry:
  kind: executable
  command: ./bin/carve_runner
  args:
    - --request
    - "{request}"
    - --result
    - "{result}"

variants:
  - id: base
    internal: true
    args: []
    capabilities:
      operations: [union, intersection, difference]
      input_formats: [off, obj, stl]
      requires_closed_meshes: true
      accepts_self_intersections: false
      accepts_non_manifold_inputs: false
      supports_components: false
      supports_variadic_booleans: false

  - id: default
    extends: base
    label: "Default"
    display_name: "Carve 2014-9"
    color: "#795548"
    args: []

notes:
  - "Mesh type: carve::mesh::MeshSet<3>"
  - "Boolean ops: carve::csg::CSG::compute(a, b, op) with UNION / INTERSECTION / A_MINUS_B"
  - "Requires closed, manifold meshes"
  - "Raw mesh format: indexed-tris-f64 (via runner_mesh_helpers)"
  - "io_ms (load-mesh): file -> flat double verts + int indices (runner_mesh_helpers::loadFromFileIndexed)"
  - "import_ms (load-mesh): flat f64 verts+indices -> carve::input::PolyhedronData -> carve::mesh::MeshSet<3>"
  - "export_ms (boolean ops): MeshSet<3> face/vertex traversal + fan triangulation; excludes disk write"
